[package]
name = "self-obs-live-check"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
rust-version = "1.75.0"
publish = false
autobenches = false

# Purpose-built example for the sdk-self-observability CI workflow.
# Exercises the SDK's self-observability metrics by creating a LoggerProvider
# with a BatchLogProcessor + OTLP gRPC exporter, emitting logs, and shutting
# down. Not intended as illustrative user-facing documentation.

[[bin]]
name = "self-obs-live-check"
path = "src/main.rs"
bench = false

[dependencies]
opentelemetry = { workspace = true }
opentelemetry_sdk = { workspace = true, features = ["logs", "metrics", "experimental_metrics_bound_instruments", "testing"] }
opentelemetry-otlp = { workspace = true, features = ["grpc-tonic", "metrics"] }
opentelemetry-appender-tracing = { workspace = true }
tracing = { workspace = true, features = ["std"] }
tracing-subscriber = { workspace = true, features = ["env-filter", "registry", "std", "fmt"] }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
