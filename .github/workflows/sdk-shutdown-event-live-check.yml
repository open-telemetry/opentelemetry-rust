name: SDK Shutdown Event Live Check

# Validates that the otel.sdk.component.shutdown event emitted by SDK
# providers matches the in-tree semconv registry under `semconv/`.
# Companion to #3553 (SDK self-obs metrics live-check).

env:
  CI: true
  WEAVER_VERSION: v0.24.0

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'opentelemetry-sdk/src/logs/logger_provider.rs'
      - 'opentelemetry-sdk/src/trace/provider.rs'
      - 'opentelemetry-sdk/src/metrics/meter_provider.rs'
      - 'semconv/**'
      - 'examples/shutdown-event-live-check/**'
      - '.github/workflows/sdk-shutdown-event-live-check.yml'
  merge_group:
  push:
    branches:
      - main
    paths:
      - 'opentelemetry-sdk/src/logs/logger_provider.rs'
      - 'opentelemetry-sdk/src/trace/provider.rs'
      - 'opentelemetry-sdk/src/metrics/meter_provider.rs'
      - 'semconv/**'
      - 'examples/shutdown-event-live-check/**'
      - '.github/workflows/sdk-shutdown-event-live-check.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal --no-self-update

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: shutdown-live-check-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build live-check app
        run: cargo build --release -p shutdown-event-live-check

      - name: Setup weaver
        uses: open-telemetry/weaver/.github/actions/setup-weaver@v0.24.0
        with:
          version: ${{ env.WEAVER_VERSION }}

      - name: Start weaver live-check
        id: live-check
        uses: open-telemetry/weaver/.github/actions/weaver-live-check-start@v0.24.0
        with:
          registry: semconv

      - name: Run live-check app
        env:
          OTEL_BSP_SCHEDULE_DELAY: '500'
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ steps.live-check.outputs.otlp-grpc-endpoint }}
        run: |
          set -euo pipefail
          ./target/release/shutdown-event-live-check > "${{ steps.live-check.outputs.state-dir }}/app.log" 2>&1
          echo "App exited cleanly"

      - name: Stop weaver live-check
        id: weaver-stop
        if: always()
        uses: open-telemetry/weaver/.github/actions/weaver-live-check-stop@v0.24.0
        with:
          fail-on: violation

      - name: Upload live-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sdk-shutdown-event-live-check
          path: ${{ steps.live-check.outputs.state-dir }}
          if-no-files-found: warn
